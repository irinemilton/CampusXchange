{% extends 'base.html' %}

{% block title %}Sign In{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-20 px-4 relative">
    <!-- Background Effects -->
    <div class="absolute top-1/3 left-1/4 w-72 h-72 bg-indigo-600/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/3 right-1/4 w-72 h-72 bg-purple-600/10 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md relative z-10 animate-slide-up">
        <!-- Header -->
        <div class="text-center mb-8">
            <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2 mb-6">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-2xl shadow-lg shadow-indigo-500/25">
                    ♻️
                </div>
            </a>
            <h1 class="font-display text-3xl font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-sm text-slate-400">Sign in to your CampusXchange account</p>
        </div>

        <!-- Form Card -->
        <div class="glass rounded-3xl p-8">
            <form method="POST" action="{{ url_for('login') }}" class="space-y-5" id="login-form">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="w-4 h-4 text-slate-500 absolute left-4 top-1/2 -translate-y-1/2"></i>
                        <input type="email" name="email" id="login-email" required
                               class="input-field w-full pl-11 pr-4 py-3 rounded-xl text-sm text-white placeholder-slate-500"
                               placeholder="you@campus.edu">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="w-4 h-4 text-slate-500 absolute left-4 top-1/2 -translate-y-1/2"></i>
                        <input type="password" name="password" id="login-password" required
                               class="input-field w-full pl-11 pr-12 py-3 rounded-xl text-sm text-white placeholder-slate-500"
                               placeholder="Enter your password">
                        <button type="button" onclick="togglePassword('login-password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-primary w-full py-3.5 rounded-xl text-sm font-semibold text-white flex items-center justify-center gap-2" id="login-submit">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-xs text-slate-500">OR</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Demo Login -->
            <button onclick="fillDemoCredentials()" class="btn-secondary w-full py-3 rounded-xl text-sm font-medium text-slate-300 flex items-center justify-center gap-2" id="demo-login-btn">
                <i data-lucide="zap" class="w-4 h-4 text-amber-400"></i>
                <span>Quick Demo Login</span>
            </button>

            <!-- Register Link -->
            <p class="text-center text-sm text-slate-400 mt-6">
                Don't have an account?
                <a href="{{ url_for('register') }}" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Create one</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
        } else {
            input.type = 'password';
        }
    }

    function fillDemoCredentials() {
        document.getElementById('login-email').value = 'aarav@campus.edu';
        document.getElementById('login-password').value = 'demo123';
        document.getElementById('login-email').classList.add('ring-2', 'ring-indigo-500/50');
        document.getElementById('login-password').classList.add('ring-2', 'ring-indigo-500/50');
        setTimeout(() => {
            document.getElementById('login-form').submit();
        }, 500);
    }
</script>
{% endblock %}
